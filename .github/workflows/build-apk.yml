name: Build and Release Android APK

on:
  push:
    branches:
      - master # Or whichever branch you want to trigger this

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_VERSION_CODE: ${{ github.run_number }}
      ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Prepare Release Metadata
        run: |
          echo "APK_VERSION_NAME=${ANDROID_VERSION_NAME}-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Validate Android Signing Secrets
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Restore Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore

      - name: Sync Capacitor
        run: |
          mkdir -p dist
          mkdir -p android/app/src/main/assets/public
          npx cap sync android

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks android/release.keystore \
            --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --out app-release.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Verify Signed APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          "$BUILD_TOOLS_DIR/apksigner" verify app-release.apk

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          tag: "latest"
          name: "Latest Agent Build"
          body: "Automated Release APK for the Agent App Panel. Download app-release.apk to install. Version: ${{ env.APK_VERSION_NAME }}"
          artifacts: "app-release.apk"
          makeLatest: true
